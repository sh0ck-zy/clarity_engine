<!DOCTYPE html>
<html>
<head>
    <title>Clarity Lab HQ v4.2</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { 
            --sidebar-bg: #0f172a; --canvas-bg: #f1f5f9; --panel-bg: #ffffff;
            --text-main: #1e293b; --text-muted: #64748b; --accent: #2563eb; --border: #e2e8f0;
            --lucky-bg: #fee2e2; --lucky-text: #991b1b;
            --unlucky-bg: #dcfce7; --unlucky-text: #166534;
        }
        body { font-family: "Inter", sans-serif; background: var(--canvas-bg); margin: 0; display: flex; height: 100vh; overflow: hidden; color: var(--text-main); }
        
        /* SIDEBAR */
        .sidebar { width: 260px; background: var(--sidebar-bg); color: #fff; display: flex; flex-direction: column; border-right: 1px solid #1e293b; flex-shrink: 0; }
        .brand { padding: 20px; font-weight: 800; font-size: 16px; border-bottom: 1px solid #1e293b; letter-spacing: 0.5px; }
        .filters { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        select.dark-input { width: 100%; padding: 8px; background: #1e293b; border: 1px solid #334155; color: #fff; border-radius: 6px; outline:none; }
        
        /* MAIN */
        .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        
        /* TRUTH BAR (Top) */
        .truth-bar { height: 60px; background: #fff; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; justify-content: space-between; flex-shrink: 0; position: sticky; top: 0; z-index: 10; }
        .match-display { display: flex; align-items: center; gap: 20px; }
        .score-pill { font-size: 20px; font-weight: 900; color: #0f172a; background: #f8fafc; padding: 5px 15px; border-radius: 8px; border: 1px solid var(--border); }
        
        /* CONTENT */
        .content-area { flex: 1; overflow-y: auto; padding: 20px; position: relative; }
        
        /* TABLE */
        #view-table { max-width: 1400px; margin: 0 auto; display: block; }
        table { width: 100%; background: #fff; border-radius: 8px; border-collapse: separate; border-spacing: 0; border: 1px solid var(--border); }
        th { background: #f8fafc; padding: 12px 16px; text-align: left; font-size: 11px; font-weight: 700; color: var(--text-muted); border-bottom: 1px solid var(--border); text-transform: uppercase; }
        td { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 13px; }
        tr:hover { background: #f8fafc; cursor: pointer; }
        .status-badge { padding: 3px 8px; border-radius: 99px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .bg-fin { background: #dcfce7; color: #166534; }
        
        /* COMPARATOR GRID */
        #view-detail { display: none; height: 100%; }
        .comparator-grid { display: grid; grid-template-columns: 1fr 1fr 350px; gap: 20px; height: 100%; }
        
        .panel { background: #fff; border-radius: 8px; border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        .panel-header { padding: 12px 16px; border-bottom: 1px solid var(--border); background: #f8fafc; display: flex; justify-content: space-between; align-items: center; height: 50px; }
        .panel-body { padding: 20px; overflow-y: auto; flex: 1; }
        
        /* CHAT */
        .chat-container { display: flex; flex-direction: column; height: 100%; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #f8fafc; }
        .msg { padding: 10px 14px; border-radius: 8px; font-size: 13px; line-height: 1.5; max-width: 90%; word-break: break-word; }
        .msg-user { background: #2563eb; color: #fff; align-self: flex-end; border-bottom-right-radius: 0; }
        .msg-ai { background: #fff; border: 1px solid var(--border); color: #1e293b; align-self: flex-start; border-bottom-left-radius: 0; }
        .chat-input-area { padding: 15px; border-top: 1px solid var(--border); background: #fff; }
        .chat-input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; outline: none; font-size: 13px; }

        /* UTILS */
        .hidden { display: none !important; }
        .selector { padding: 6px; border-radius: 4px; border: 1px solid var(--border); font-size: 12px; }
        pre { background: #1e293b; color: #e2e8f0; padding: 15px; border-radius: 6px; font-size: 11px; overflow-x: auto; font-family: monospace; }
        .card-stat { background: #f8fafc; padding: 15px; border-radius: 6px; border: 1px solid var(--border); margin-bottom: 15px; }
        .empty { text-align: center; padding: 40px; color: var(--text-muted); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand">CLARITY LAB</div>
        <div class="filters">
            <select class="dark-input" id="sel-season" onchange="init()"><option value="2025-2026">2025-2026</option></select>
            <select class="dark-input" id="sel-round" onchange="loadTable()"><option value="all">All Rounds</option></select>
            <div style="border-top:1px solid #334155;"></div>
            <label style="font-size:10px; color:#94a3b8; font-weight:700;">DEFAULT BRAIN</label>
            <select class="dark-input" id="sel-prompt">
                {% for key, val in prompts.items() %} <option value="{{ key }}">{{ val.name }}</option> {% endfor %}
            </select>
        </div>
    </div>

    <div class="main">
        <!-- TRUTH BAR -->
        <div class="top-nav truth-bar">
            <div style="display:flex; align-items:center; gap:20px;">
                <button onclick="showTable()" style="background:#f1f5f9; border:1px solid #e2e8f0; padding:6px 12px; border-radius:6px; cursor:pointer;">Back</button>
                <div id="match-title" style="font-weight:700; font-size:16px;">Season Overview</div>
            </div>
            <div id="match-truth" class="hidden match-display">
                <span style="font-size:12px; font-weight:700; color:#64748b; text-transform:uppercase;">REALITY</span>
                <div class="score-pill" id="truth-score">- : -</div>
                <div style="font-size:12px; color:#64748b;">xG: <span id="truth-xg">-</span></div>
            </div>
        </div>

        <div class="content-area">
            
            <!-- VIEW: TABLE -->
            <div id="view-table">
                <table>
                    <thead><tr><th>Round</th><th>Date</th><th>Matchup</th><th>Score</th><th>xG</th><th>Status</th></tr></thead>
                    <tbody id="table-body"></tbody>
                </table>
                <div id="table-empty" class="empty hidden">No fixtures found for this filter.</div>
            </div>

            <!-- VIEW: COMPARATOR -->
            <div id="view-detail">
                <div class="comparator-grid">
                    
                    <!-- PANE 1: PRIMARY ANALYSIS -->
                    <div class="panel">
                        <div class="panel-header">
                            <select id="hist-a" class="selector" onchange="loadPane('a', this.value)">
                                <option value="">Loading...</option>
                            </select>
                            <span style="font-size:10px; font-weight:700; color:#2563eb; background:#eff6ff; padding:2px 6px; border-radius:4px;">ACTIVE</span>
                        </div>
                        <div class="panel-body" id="pane-a-body">
                            <div class="empty">Load an analysis to see details.</div>
                        </div>
                    </div>

                    <!-- PANE 2: COMPARISON -->
                    <div class="panel">
                        <div class="panel-header">
                            <select id="hist-b" class="selector" onchange="loadPane('b', this.value)">
                                <option value="">Select Comparison...</option>
                            </select>
                            <span style="font-size:10px; font-weight:700; color:#64748b;">COMPARE</span>
                        </div>
                        <div class="panel-body" id="pane-b-body">
                            <div class="empty">Select a version to compare.</div>
                        </div>
                    </div>

                    <!-- PANE 3: CO-PILOT -->
                    <div class="panel">
                        <div class="panel-header">
                            <span style="font-weight:700; font-size:13px;"><i class="fas fa-robot"></i> Co-Pilot</span>
                        </div>
                        <div class="chat-container">
                            <div class="chat-messages" id="chat-feed">
                                <div class="msg msg-ai">Hello! I'm Gemini 3. I have context on both analyses shown here. How can we improve the logic?</div>
                            </div>
                            <div class="chat-input-area">
                                <input type="text" id="chat-input" class="chat-input" placeholder="Ask about this match..." onkeypress="handleChat(event)">
                            </div>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <script>
        let currentMatchId = null;
        let contextData = {}; // Stores match + analyses for Chat

        window.onload = function() { init(); };

        async function init() {
            const season = document.getElementById('sel-season').value;
            try {
                const res = await fetch(`/api/rounds/${season}`);
                const rounds = await res.json();
                const sel = document.getElementById('sel-round');
                sel.innerHTML = '<option value="all">All Rounds</option>';
                rounds.forEach(r => { const o = document.createElement('option'); o.value = r; o.text = `Round ${r}`; sel.add(o); });
            } catch (err) {
                console.error('Failed to load rounds', err);
            }
            loadTable();
        }

        async function loadTable() {
            const season = document.getElementById('sel-season').value;
            const round = document.getElementById('sel-round').value;
            const tbody = document.getElementById('table-body');
            const empty = document.getElementById('table-empty');
            tbody.innerHTML = '';
            empty.classList.add('hidden');
            try {
                const res = await fetch(`/api/matches/${season}/${round}`);
                const matches = await res.json();
                if(!matches.length) {
                    empty.classList.remove('hidden');
                    return;
                }
                matches.forEach(m => {
                    const tr = document.createElement('tr'); tr.onclick = () => openMatch(m);
                    const score = m.home_score !== null && m.away_score !== null ? `${m.home_score}-${m.away_score}` : '-';
                    const xg = m.h_xg !== null && m.a_xg !== null ? `${Number(m.h_xg).toFixed(1)}-${Number(m.a_xg).toFixed(1)}` : '-';
                    tr.innerHTML = `<td>${m.round}</td><td>${m.date}</td><td><b>${m.home_team}</b> v ${m.away_team}</td><td>${score}</td><td>${xg}</td><td><span class="status-badge bg-fin">${m.status}</span></td>`;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                console.error('Failed to load matches', err);
                empty.classList.remove('hidden');
                empty.textContent = 'Error loading fixtures.';
            }
        }

        async function openMatch(match) {
            currentMatchId = match.id;
            contextData = { match: match, analysis_a: null, analysis_b: null };
            
            document.getElementById('view-table').style.display = 'none';
            document.getElementById('view-detail').style.display = 'block';
            document.getElementById('match-truth').classList.remove('hidden');
            
            document.getElementById('match-title').innerText = `${match.home_team} vs ${match.away_team}`;
            document.getElementById('truth-score').innerText = match.home_score !== null && match.away_score !== null ? `${match.home_score} - ${match.away_score}` : '- : -';
            document.getElementById('truth-xg').innerText = match.h_xg !== null && match.a_xg !== null ? `${match.h_xg} - ${match.a_xg}` : '-';

            try {
                const res = await fetch(`/api/fixture/${match.id}/history`);
                const history = await res.json();
                
                populateDropdown('hist-a', history);
                populateDropdown('hist-b', history);
                
                if(history.length > 0) loadPane('a', history[0].id);
            } catch (err) {
                console.error('Failed to load history', err);
            }
        }

        function populateDropdown(id, history) {
            const sel = document.getElementById(id);
            sel.innerHTML = '<option value="">Select...</option>';
            history.forEach(h => {
                const o = document.createElement('option'); o.value = h.id; 
                o.text = `${h.prompt_version} (${h.created_at.substring(5,16)})`; 
                sel.add(o);
            });
        }

        function showTable() {
            document.getElementById('view-detail').style.display = 'none';
            document.getElementById('view-table').style.display = 'block';
            document.getElementById('match-truth').classList.add('hidden');
        }

        async function loadPane(pane, analysisId) {
            if(!analysisId) return;
            try {
                const res = await fetch(`/api/report/${analysisId}`);
                const data = await res.json();
                if(!data.exists) {
                    document.getElementById(`pane-${pane}-body`).innerHTML = '<div class="empty">Analysis not found.</div>';
                    return;
                }
                
                if(pane === 'a') contextData.analysis_a = data.payload;
                if(pane === 'b') contextData.analysis_b = data.payload;

                const p = data.payload || {};
                const risks = (p.risk_factors || []).join(', ') || 'None logged';
                const headline = p.headline || 'No Headline';
                const scoreline = p.prediction && p.prediction.scoreline ? p.prediction.scoreline : '-';
                const conf = p.prediction && p.prediction.confidence !== undefined ? p.prediction.confidence : '-';
                const body = document.getElementById(`pane-${pane}-body`);

                body.innerHTML = `
                    <div class="card-stat">
                        <div style="font-size:18px; font-weight:800; margin-bottom:5px;">${headline}</div>
                        <div style="font-size:12px; color:#64748b;">${scoreline} (${conf}%)</div>
                    </div>
                    <div style="font-size:13px; line-height:1.6; color:#334155; white-space:pre-wrap;">${p.narrative?.game_flow || ''}</div>
                    <div style="margin-top:20px; font-size:11px;">
                        <b>Risks:</b> ${risks}
                    </div>
                    <div style="margin-top:20px;">
                        <button onclick="toggleRaw('${pane}')" style="font-size:10px; cursor:pointer;">Show Raw Logic</button>
                        <pre id="raw-${pane}" class="hidden">${JSON.stringify(p.glass_box_logic || {}, null, 2)}</pre>
                    </div>
                `;
            } catch (err) {
                console.error('Failed to load analysis', err);
                document.getElementById(`pane-${pane}-body`).innerHTML = '<div class="empty">Error loading analysis.</div>';
            }
        }

        function toggleRaw(pane) {
            document.getElementById(`raw-${pane}`).classList.toggle('hidden');
        }

        function appendMessage(role, text) {
            const feed = document.getElementById('chat-feed');
            const msg = document.createElement('div');
            msg.className = `msg ${role === 'user' ? 'msg-user' : 'msg-ai'}`;
            msg.textContent = text;
            feed.appendChild(msg);
            feed.scrollTop = feed.scrollHeight;
        }

        // --- CHAT ---
        async function handleChat(e) {
            if(e.key !== 'Enter') return;
            const input = document.getElementById('chat-input');
            const txt = input.value.trim();
            if(!txt) return;
            
            appendMessage('user', txt);
            input.value = '';

            try {
                const res = await fetch('/api/copilot/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        messages: [{role: "user", content: txt}],
                        context: contextData
                    })
                });
                const data = await res.json();
                appendMessage('assistant', data.content || 'No response.');
            } catch (err) {
                console.error('Copilot error', err);
                appendMessage('assistant', 'Copilot unavailable right now.');
            }
        }
    </script>
</body>
</html>
